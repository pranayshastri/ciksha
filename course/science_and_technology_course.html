    <style>
        /* Modern styling for the expandable list */
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .topic {
            cursor: pointer;
            padding: 15px;
            margin: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topic:hover {
            background-color: #e0e0e0;
        }

        .content {
            display: none;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 0 0 5px 5px;
        }

        /* Custom video icon using CSS */
        .video-icon::before {
            content: "\f03d"; /* Unicode for a video icon (You can replace this with any other icon you prefer) */
            font-family: FontAwesome;
            font-size: 24px;
            margin-right: 10px;
        }

        /* YouTube video container */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            padding-top: 30px;
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Complete Science And Technology Course For UPSC Civil Service Examination</h1>
    <div class="topic" onclick="toggleContent(1)">
        <span>Topic 1</span>
        <i class="video-icon"></i>

    <div class="content" id="content1">

            <iframe width="560" height="315" src="https://www.youtube.com/embed/YOUR_VIDEO_ID_1" frameborder="0" allowfullscreen></iframe>

    <script>
        // JavaScript function to toggle content
        function toggleContent(topicNumber) {
            var content = document.getElementById('content' + topicNumber);
            
            if (content.style.display === 'none' || content.style.display === '') {
                content.style.display = 'block';
            } else {
                content.style.display = 'none';
            }
        }
    </script>
